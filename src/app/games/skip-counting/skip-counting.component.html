<app-game-shell
  gameTitle="Skip Counting"
  [tier]="tier()"
  [totalTiers]="totalTiers"
  [streak]="streak()"
  [running]="isAnswering()"
  [feedback]="feedback()"
>
  <p class="text-center text-gray-500 mb-6">Fill in the missing numbers.</p>

  <div class="flex items-center justify-center gap-3 flex-wrap mb-6">
    @for (n of puzzle().sequence; track $index) {
      @if (n !== null) {
        <span class="w-16 text-center text-xl font-bold py-3 rounded-lg bg-gray-50">{{ n }}</span>
      } @else {
        <app-number-input
          [value]="answers()[missingPosition($index)]"
          [disabled]="!isAnswering()"
          (valueChange)="setAnswer(missingPosition($index), $event)"
        />
      }
    }
  </div>

  <div class="text-center">
    <button
      type="button"
      class="px-6 py-3 rounded-xl bg-indigo-500 text-white font-semibold disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="!canSubmit()"
      (click)="submit()"
    >
      Check
    </button>
  </div>
</app-game-shell>
